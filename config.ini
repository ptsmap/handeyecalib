# Active device profiles.
active_robot=robot1
active_camera=camera1
robot_profiles=robot1,robot2
camera_profiles=camera1,camera2

# Robot profiles. type values should match moduleDevice registrations, e.g. Hans, Duco, SIM.
robot.robot1.type=Hans
robot.robot1.ip=192.168.100.11
robot.robot1.port=10003
robot.robot1.box_id=0
robot.robot1.robot_id=0
robot.robot1.flange_name=TCP
robot.robot1.welder_name=welder

robot.robot2.type=Duco
robot.robot2.ip=192.168.100.11
robot.robot2.port=7003
robot.robot2.flange_name=TCP
robot.robot2.welder_name=welder

# Camera profiles. type values should match moduleDevice registrations, e.g. VzNL, SIM.
camera.camera1.type=VzNL
camera.camera1.key=
camera.camera1.ip=
camera.camera1.exposure_time=200
camera.camera1.gain_left=1
camera.camera1.gain_right=1
camera.camera1.frame_rate=199
camera.camera1.swing_start=0
camera.camera1.swing_end=68
camera.camera1.swing_speed=30

camera.camera2.type=VzNL
camera.camera2.key=
camera.camera2.ip=
camera.camera2.exposure_time=200
camera.camera2.gain_left=1
camera.camera2.gain_right=1
camera.camera2.frame_rate=199
camera.camera2.swing_start=0
camera.camera2.swing_end=68
camera.camera2.swing_speed=30

# Legacy keys remain supported for backward compatibility.
robot_type=huayan
robot_ip=192.168.100.11
robot_port=10003
robot_box_id=0
robot_id=0
robot_flange_name=TCP
robot_welder_name=welder
camera_ip=
camera_exposure_time=200
camera_gain=1
camera_frame_rate=160

# Point cloud snapshot options.
# result_type can be PointXYZRGBA or Position. PointXYZRGBA is written as ascii PCD x y z rgb.
result_type=PointXYZRGBA
flip_y=false
map_to_rgb=false
clip_rgb=false
export_feature_cloud=true

# Output folder. Relative paths are resolved from the executable folder.
output_dir=output
